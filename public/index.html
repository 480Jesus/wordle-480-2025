<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <h1>WORDLE</h1>
    <p id="status">Guess the 5-letter word in 6 tries.</p>

    <section id="grid" class="grid" aria-label="Word grid"></section>

    <form id="guess-form" class="guess-form" autocomplete="off">
      <input id="guess-input" maxlength="5" minlength="5" pattern="[A-Za-z]{5}" placeholder="Type 5 letters" required />
      <button type="submit">Try</button>
    </form>

    <button id="reset" type="button">New game</button>
  </main>

  <script src="/main.js" defer></script>
</body>
</html>
