name: build-test-deploy

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Descarga del código
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2) Setup de Node (usa la versión que utilizas en Render)
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3) Instalación limpia respetando package-lock
      #    --include=dev asegura que se instalen devDependencies (ts, @types, jest…)
      - name: 📦 Install
        run: npm ci --include=dev

      # 4) Compilación TypeScript (si procede)
      - name: 🧱 Build
        run: npm run build

      # 5) Tests: Jest/Supertest (si no tienes tests aún, mantén --passWithNoTests o un script "test" básico)
      - name: 🧪 Test
        run: npm test

      # 6) (Opcional) Deploy a Render vía Deploy Hook, sólo si los pasos previos han pasado
      #    Evitamos error 409 (deploy ya en curso) con un pequeño wait defensivo
      - name: 🚀 Deploy to Render (Deploy Hook)
        if: ${{ success() && env.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Esperando unos segundos para evitar 409 si Render está ocupando pipeline..."
          sleep 10
          echo "Triggering Render deploy via Deploy Hook..."
          curl -fsS "$RENDER_DEPLOY_HOOK_URL" -o /dev/null
          echo "Deploy hook sent."

      # (Opcional) fall back informativo por si falta el secreto
      - name: ℹ️ Skip deploy (no hook configured)
        if: ${{ success() && env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL no configurado. Sólo build+test."