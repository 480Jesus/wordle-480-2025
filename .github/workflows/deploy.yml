name: CI + Deploy to Render

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Install
        run: npm ci

      - name: 🧱 Build (TypeScript)
        run: npm run build

      - name: 🧪 Test (no bloqueo si no hay tests)
        run: npm test || echo "No tests or tests failed (non-blocking)."

      - name: 🚀 Deploy to Render (Deploy Hook)
        if: ${{ success() }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi
          echo "Triggering Render deploy via Deploy Hook..."
          curl -fsS "$RENDER_DEPLOY_HOOK_URL" -o /dev/null
          echo "Deploy hook sent successfully."
